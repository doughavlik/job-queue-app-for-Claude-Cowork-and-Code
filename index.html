<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Job Queue Manager</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #d97706;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-400: #9ca3af;
      --gray-600: #4b5563;
      --gray-800: #1f2937;
      --radius: 8px;
      --tap: 44px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      min-height: 100vh;
    }

    /* ── Login ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: white;
      border-radius: var(--radius);
      padding: 32px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 24px;
      text-align: center;
      color: var(--gray-800);
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-600);
      margin-bottom: 4px;
    }

    input[type="email"],
    input[type="password"],
    textarea {
      width: 100%;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 16px; /* prevents iOS zoom */
      font-family: inherit;
      color: var(--gray-800);
      background: white;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, textarea:focus { border-color: var(--primary); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: var(--tap);
      padding: 0 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn:disabled { opacity: 0.5; cursor: default; }

    .btn-primary { background: var(--primary); color: white; width: 100%; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }

    .btn-sm {
      min-height: var(--tap);
      min-width: var(--tap);
      padding: 0 12px;
      font-size: 13px;
    }

    .btn-ghost { background: transparent; color: var(--gray-600); }
    .btn-ghost:hover { background: var(--gray-100); }

    .btn-success { background: transparent; color: var(--success); }
    .btn-success:hover { background: #dcfce7; }

    .btn-danger { background: transparent; color: var(--danger); }
    .btn-danger:hover { background: #fee2e2; }

    /* ── App layout ── */
    #app-screen {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .app-header {
      background: white;
      border-bottom: 1px solid var(--gray-200);
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .app-title { font-size: 17px; font-weight: 600; }

    /* ── Queue tabs ── */
    .queue-tabs {
      display: flex;
      background: white;
      border-bottom: 1px solid var(--gray-200);
      position: sticky;
      top: 56px;
      z-index: 9;
    }

    .queue-tab {
      flex: 1;
      min-height: var(--tap);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-size: 15px;
      font-weight: 500;
      color: var(--gray-400);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      font-family: inherit;
    }

    .queue-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* ── Content ── */
    .content {
      flex: 1;
      padding: 16px;
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Add-job form ── */
    .add-job-form {
      background: white;
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .add-job-form textarea {
      min-height: 80px;
      resize: vertical;
      margin-bottom: 8px;
    }

    /* ── Filter pills ── */
    .filter-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .filter-tab {
      padding: 0 14px;
      min-height: 36px;
      border-radius: 20px;
      border: 1px solid var(--gray-200);
      background: white;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-600);
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      transition: background 0.15s, color 0.15s;
    }

    .filter-tab.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* ── Job list ── */
    .job-list { display: flex; flex-direction: column; gap: 8px; }

    .job-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      padding: 12px;
      border-left: 3px solid var(--gray-200);
      transition: opacity 0.15s;
    }

    .job-card.done { border-left-color: var(--success); opacity: 0.65; }
    .job-card.on-hold { border-left-color: var(--warning); opacity: 0.8; }

    .job-header { display: flex; align-items: flex-start; gap: 8px; }

    /* reorder column */
    .reorder-btns { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }

    .reorder-btn {
      width: 28px;
      height: 28px;
      border: 1px solid var(--gray-200);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gray-600);
      transition: background 0.15s;
      font-family: inherit;
    }

    .reorder-btn:hover:not(:disabled) { background: var(--gray-100); }
    .reorder-btn:disabled { opacity: 0.25; cursor: default; }

    /* status toggle */
    .status-btn {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--gray-400);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
      font-size: 13px;
      transition: border-color 0.15s, background 0.15s;
    }

    .status-btn.done {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    /* job body */
    .job-body { flex: 1; min-width: 0; }

    .job-markdown {
      font-size: 15px;
      line-height: 1.55;
      word-break: break-word;
    }

    .job-markdown p { margin-bottom: 6px; }
    .job-markdown p:last-child { margin-bottom: 0; }
    .job-markdown h1, .job-markdown h2, .job-markdown h3 { margin-bottom: 4px; }
    .job-markdown code { background: var(--gray-100); padding: 1px 5px; border-radius: 3px; font-size: 13px; }
    .job-markdown pre { background: var(--gray-100); padding: 10px; border-radius: 4px; overflow-x: auto; margin-bottom: 8px; }
    .job-markdown pre code { background: none; padding: 0; }
    .job-markdown ul, .job-markdown ol { padding-left: 20px; margin-bottom: 6px; }
    .job-markdown a { color: var(--primary); }

    .job-actions { display: flex; gap: 4px; margin-top: 8px; }

    /* inline editor */
    .job-edit-area {
      width: 100%;
      min-height: 80px;
      resize: vertical;
      margin-top: 10px;
      font-family: ui-monospace, monospace;
      font-size: 14px;
    }

    .job-edit-actions { display: flex; gap: 8px; margin-top: 8px; }

    /* misc */
    .error-msg { color: var(--danger); font-size: 14px; margin-top: 8px; }
    .empty-state { text-align: center; color: var(--gray-400); padding: 48px 0; font-size: 15px; }
    .loading { text-align: center; color: var(--gray-400); padding: 32px 0; font-size: 14px; }
    .hidden { display: none !important; }

    /* ── Completion info ── */
    .job-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
      font-size: 12px;
      color: var(--gray-400);
    }

    .job-meta-repo {
      color: var(--primary);
      font-weight: 500;
    }

    .job-completed-at { font-style: italic; }

    .job-summary {
      margin-top: 8px;
      padding: 8px 10px;
      background: var(--gray-100);
      border-radius: 4px;
      font-size: 13px;
      color: var(--gray-600);
      border-left: 3px solid var(--success);
    }

    .job-summary-toggle {
      background: none;
      border: none;
      color: var(--primary);
      font-size: 12px;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      margin-top: 4px;
    }

    /* ── GitHub repo select ── */
    .repo-select-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    select {
      flex: 1;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 16px;
      font-family: inherit;
      color: var(--gray-800);
      background: white;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    select:focus { border-color: var(--primary); }

    /* ── Settings panel ── */
    .settings-panel {
      background: white;
      border-bottom: 1px solid var(--gray-200);
      padding: 16px;
    }

    .settings-panel h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .settings-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .settings-row .form-group {
      flex: 1;
      min-width: 140px;
      margin-bottom: 0;
    }

    .settings-status {
      font-size: 12px;
      color: var(--success);
      margin-top: 4px;
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     LOGIN SCREEN
═══════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <h1 class="login-title">Job Queue Manager</h1>
    <div class="form-group">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="login-btn" onclick="handleLogin()">Sign In</button>
    <p id="login-error" class="error-msg hidden"></p>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     APP SCREEN
═══════════════════════════════════════════════════ -->
<div id="app-screen" class="hidden">
  <header class="app-header">
    <span class="app-title">Job Queues</span>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn btn-ghost btn-sm" id="settings-toggle-btn" onclick="toggleSettings()">⚙ GitHub</button>
      <button class="btn btn-ghost btn-sm" onclick="handleLogout()">Sign Out</button>
    </div>
  </header>

  <!-- Settings panel (GitHub config) -->
  <div id="settings-panel" class="settings-panel hidden">
    <h2>GitHub Settings</h2>
    <div class="settings-row">
      <div class="form-group">
        <label for="gh-username">GitHub Username</label>
        <input type="text" id="gh-username" placeholder="octocat" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="gh-token">Personal Access Token</label>
        <input type="password" id="gh-token" placeholder="github_pat_…" autocomplete="off">
      </div>
      <button class="btn btn-primary btn-sm" style="min-width:80px;align-self:flex-end;" onclick="saveGitHubSettings()">Save &amp; Load</button>
    </div>
    <p id="gh-status" class="settings-status hidden"></p>
  </div>

  <div class="queue-tabs">
    <button class="queue-tab active" id="tab-cowork" onclick="switchQueue('cowork')">Claude Cowork</button>
    <button class="queue-tab" id="tab-code" onclick="switchQueue('code')">Claude Code</button>
  </div>

  <div class="content">
    <div class="add-job-form">
      <textarea id="new-job-body" placeholder="New job (markdown supported)…"></textarea>
      <div class="repo-select-row">
        <select id="new-job-repo">
          <option value="">— No repo —</option>
        </select>
        <button class="btn btn-ghost btn-sm" onclick="loadGitHubRepos(true)" title="Refresh repos">↺</button>
      </div>
      <button class="btn btn-primary" id="add-job-btn" onclick="handleAddJob()">Add Job</button>
      <p id="add-error" class="error-msg hidden"></p>
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active" id="filter-todo" onclick="setFilter('todo')">Todo</button>
      <button class="filter-tab" id="filter-on-hold" onclick="setFilter('on-hold')">On Hold</button>
      <button class="filter-tab" id="filter-done" onclick="setFilter('done')">Done</button>
      <button class="filter-tab" id="filter-all" onclick="setFilter('all')">All</button>
    </div>

    <div id="job-list" class="job-list">
      <div class="loading">Loading…</div>
    </div>
  </div>
</div>

<script>
// ================================================================
// CONFIGURATION — paste your Supabase project values here
// ================================================================
const SUPABASE_URL  = 'https://ifzcegsompgglmxmqulc.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_bAQS3utniJH5IPAYIbeQsA_Ydv6FWmK';
// ================================================================

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentQueue  = 'cowork';
let currentFilter = 'todo';
let jobs = [];          // all jobs for the current queue (all statuses)

// ─── Auth ──────────────────────────────────────────────────────

async function checkSession() {
  const { data: { session } } = await db.auth.getSession();
  session ? showApp() : showLogin();
}

async function handleLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn      = document.getElementById('login-btn');
  const errEl    = document.getElementById('login-error');

  btn.disabled    = true;
  btn.textContent = 'Signing in…';
  errEl.classList.add('hidden');

  const { error } = await db.auth.signInWithPassword({ email, password });

  if (error) {
    errEl.textContent = error.message;
    errEl.classList.remove('hidden');
    btn.disabled    = false;
    btn.textContent = 'Sign In';
  } else {
    showApp();
  }
}

async function handleLogout() {
  await db.auth.signOut();
  showLogin();
}

function showLogin() {
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app-screen').classList.add('hidden');
}

function showApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');
  loadJobs();
}

// ─── Queue & filter ────────────────────────────────────────────

function switchQueue(queue) {
  currentQueue = queue;
  document.getElementById('tab-cowork').classList.toggle('active', queue === 'cowork');
  document.getElementById('tab-code').classList.toggle('active', queue === 'code');
  loadJobs();
}

function setFilter(filter) {
  currentFilter = filter;
  ['todo', 'on-hold', 'done', 'all'].forEach(f =>
    document.getElementById('filter-' + f).classList.toggle('active', f === filter)
  );
  renderJobs();
}

// ─── Data ──────────────────────────────────────────────────────

async function loadJobs() {
  document.getElementById('job-list').innerHTML = '<div class="loading">Loading…</div>';

  const { data, error } = await db
    .from('36074_jobs')
    .select('*')
    .eq('queue', currentQueue)
    .order('position');

  if (error) {
    document.getElementById('job-list').innerHTML =
      `<div class="error-msg">Error loading jobs: ${error.message}</div>`;
    return;
  }

  jobs = data || [];
  renderJobs();
}

function visibleJobs() {
  if (currentFilter === 'all') return jobs;
  return jobs.filter(j => j.status === currentFilter);
}

function renderJobs() {
  const listEl   = document.getElementById('job-list');
  const filtered = visibleJobs();

  if (filtered.length === 0) {
    const labelMap = { 'todo': 'todo ', 'on-hold': 'on-hold ', 'done': 'done ', 'all': '' };
    const label = labelMap[currentFilter] || '';
    listEl.innerHTML = `<div class="empty-state">No ${label}jobs in this queue.</div>`;
    return;
  }

  listEl.innerHTML = filtered.map((job, idx) => jobCardHTML(job, idx, filtered.length)).join('');
}

function jobCardHTML(job, idx, total) {
  const isDone   = job.status === 'done';
  const isOnHold = job.status === 'on-hold';
  const isTodo   = job.status === 'todo';

  // Meta line: repo + completion time
  let metaHTML = '';
  const metaParts = [];
  if (job.github_repo) {
    metaParts.push(`<span class="job-meta-repo">&#128196; ${escapeHtml(job.github_repo)}</span>`);
  }
  if (isDone && job.completed_at) {
    const dt = new Date(job.completed_at);
    const formatted = dt.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
    metaParts.push(`<span class="job-completed-at">&#10003; Completed ${formatted}</span>`);
  }
  if (isOnHold) {
    metaParts.push(`<span style="color:var(--warning);font-weight:500;">&#9208; On Hold</span>`);
  }
  if (metaParts.length) {
    metaHTML = `<div class="job-meta">${metaParts.join('')}</div>`;
  }

  // Completion summary
  let summaryHTML = '';
  if (isDone && job.completion_summary) {
    const summaryId = `summary-${job.id}`;
    summaryHTML = `
      <button class="job-summary-toggle" onclick="toggleSummary('${job.id}')">&#9656; Show Claude's summary</button>
      <div id="${summaryId}" class="job-summary hidden">${marked.parse(job.completion_summary)}</div>`;
  }

  // Edit-mode repo dropdown
  const repoOptionsForEdit = buildRepoOptions(job.github_repo || '');

  // Status button: done jobs toggle back to todo; on-hold and todo jobs can be marked done
  const statusBtnClass = isDone ? 'done' : '';
  const statusBtnTitle = isDone ? 'Mark todo' : 'Mark done';
  const statusBtnIcon  = isDone ? '&#10003;' : '';

  // Extra action buttons based on status
  let extraActions = '';
  if (isTodo) {
    extraActions = `<button class="btn btn-ghost btn-sm" onclick="holdJob('${job.id}')" title="Put on hold">Hold</button>`;
  } else if (isOnHold) {
    extraActions = `<button class="btn btn-ghost btn-sm" onclick="resumeJob('${job.id}')" title="Resume to todo">Resume</button>`;
  }

  // Card CSS class
  const cardClass = isDone ? 'done' : (isOnHold ? 'on-hold' : '');

  return `
<div class="job-card ${cardClass}" id="job-${job.id}" data-id="${job.id}">
  <div class="job-header">
    <div class="reorder-btns">
      <button class="reorder-btn" onclick="moveJob('${job.id}', -1)"
        ${idx === 0 ? 'disabled' : ''} title="Move up">&#9650;</button>
      <button class="reorder-btn" onclick="moveJob('${job.id}', 1)"
        ${idx === total - 1 ? 'disabled' : ''} title="Move down">&#9660;</button>
    </div>
    <button class="status-btn ${statusBtnClass}"
      onclick="toggleStatus('${job.id}')"
      title="${statusBtnTitle}">
      ${statusBtnIcon}
    </button>
    <div class="job-body">
      <div class="job-markdown" id="md-${job.id}">${marked.parse(job.body)}</div>
      ${metaHTML}
      ${summaryHTML}
      <div class="job-actions" id="actions-${job.id}">
        ${extraActions}
        <button class="btn btn-ghost btn-sm" onclick="startEdit('${job.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteJob('${job.id}')">Delete</button>
      </div>
      <div id="edit-${job.id}" class="hidden">
        <textarea class="job-edit-area" id="edit-ta-${job.id}">${escapeHtml(job.body)}</textarea>
        <div class="repo-select-row" style="margin-top:8px;">
          <select id="edit-repo-${job.id}">${repoOptionsForEdit}</select>
        </div>
        <div class="job-edit-actions">
          <button class="btn btn-primary btn-sm" onclick="saveEdit('${job.id}')">Save</button>
          <button class="btn btn-ghost btn-sm" onclick="cancelEdit('${job.id}')">Cancel</button>
        </div>
      </div>
    </div>
  </div>
</div>`;
}

function toggleSummary(id) {
  const el = document.getElementById('summary-' + id);
  const btn = el.previousElementSibling;
  const hidden = el.classList.toggle('hidden');
  btn.textContent = (hidden ? '▶' : '▼') + ' ' + (hidden ? 'Show' : 'Hide') + " Claude's summary";
}

function buildRepoOptions(selectedRepo) {
  let html = `<option value="">— No repo —</option>`;
  for (const repo of githubRepos) {
    const sel = repo === selectedRepo ? ' selected' : '';
    html += `<option value="${escapeHtml(repo)}"${sel}>${escapeHtml(repo)}</option>`;
  }
  // If selected repo isn't in list (e.g. list not loaded), still show it
  if (selectedRepo && !githubRepos.includes(selectedRepo)) {
    html += `<option value="${escapeHtml(selectedRepo)}" selected>${escapeHtml(selectedRepo)}</option>`;
  }
  return html;
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─── Add job ───────────────────────────────────────────────────

async function handleAddJob() {
  const body   = document.getElementById('new-job-body').value.trim();
  const btn    = document.getElementById('add-job-btn');
  const errEl  = document.getElementById('add-error');

  if (!body) return;

  btn.disabled    = true;
  btn.textContent = 'Adding…';
  errEl.classList.add('hidden');

  const maxPos = jobs.length > 0 ? Math.max(...jobs.map(j => j.position)) + 1 : 0;

  const github_repo = document.getElementById('new-job-repo').value || null;

  const { error } = await db.from('36074_jobs').insert({
    queue:    currentQueue,
    body,
    status:   'todo',
    position: maxPos,
    github_repo
  });

  btn.disabled    = false;
  btn.textContent = 'Add Job';

  if (error) {
    errEl.textContent = error.message;
    errEl.classList.remove('hidden');
  } else {
    document.getElementById('new-job-body').value = '';
    loadJobs();
  }
}

// ─── Edit job ──────────────────────────────────────────────────

function startEdit(id) {
  document.getElementById('actions-' + id).classList.add('hidden');
  document.getElementById('edit-' + id).classList.remove('hidden');
  document.getElementById('edit-ta-' + id).focus();
}

function cancelEdit(id) {
  document.getElementById('edit-' + id).classList.add('hidden');
  document.getElementById('actions-' + id).classList.remove('hidden');
}

async function saveEdit(id) {
  const body = document.getElementById('edit-ta-' + id).value.trim();
  if (!body) return;

  const repoEl = document.getElementById('edit-repo-' + id);
  const github_repo = repoEl ? (repoEl.value || null) : undefined;

  const updates = { body, updated_at: new Date().toISOString() };
  if (github_repo !== undefined) updates.github_repo = github_repo;

  const { error } = await db.from('36074_jobs').update(updates).eq('id', id);

  if (error) alert('Error saving: ' + error.message);
  else loadJobs();
}

// ─── Delete job ────────────────────────────────────────────────

async function deleteJob(id) {
  if (!confirm('Delete this job?')) return;

  const { error } = await db.from('36074_jobs').delete().eq('id', id);

  if (error) alert('Error deleting: ' + error.message);
  else loadJobs();
}

// ─── Toggle status ─────────────────────────────────────────────

async function toggleStatus(id) {
  const job = jobs.find(j => j.id === id);
  if (!job) return;

  // done → todo; todo or on-hold → done
  const newStatus = job.status === 'done' ? 'todo' : 'done';
  const now = new Date().toISOString();
  const updates = { status: newStatus, updated_at: now };

  if (newStatus === 'done') {
    updates.completed_at = now;
  } else {
    updates.completed_at = null;
  }

  const { error } = await db.from('36074_jobs').update(updates).eq('id', id);

  if (!error) loadJobs();
}

async function holdJob(id) {
  const { error } = await db.from('36074_jobs')
    .update({ status: 'on-hold', updated_at: new Date().toISOString() })
    .eq('id', id);

  if (error) alert('Error putting job on hold: ' + error.message);
  else loadJobs();
}

async function resumeJob(id) {
  const { error } = await db.from('36074_jobs')
    .update({ status: 'todo', updated_at: new Date().toISOString() })
    .eq('id', id);

  if (error) alert('Error resuming job: ' + error.message);
  else loadJobs();
}

// ─── Reorder ───────────────────────────────────────────────────

async function moveJob(id, direction) {
  const filtered = visibleJobs();
  const idx      = filtered.findIndex(j => j.id === id);
  const swapIdx  = idx + direction;

  if (swapIdx < 0 || swapIdx >= filtered.length) return;

  const jobA = filtered[idx];
  const jobB = filtered[swapIdx];

  // Swap their position values
  const [posA, posB] = [jobA.position, jobB.position];

  const [r1, r2] = await Promise.all([
    db.from('36074_jobs').update({ position: posB, updated_at: new Date().toISOString() }).eq('id', jobA.id),
    db.from('36074_jobs').update({ position: posA, updated_at: new Date().toISOString() }).eq('id', jobB.id)
  ]);

  if (r1.error) { alert('Error reordering: ' + r1.error.message); return; }
  if (r2.error) { alert('Error reordering: ' + r2.error.message); return; }

  loadJobs();
}

// ─── GitHub repo integration ───────────────────────────────────

let githubRepos = [];

function toggleSettings() {
  const panel = document.getElementById('settings-panel');
  panel.classList.toggle('hidden');
}

function saveGitHubSettings() {
  const username = document.getElementById('gh-username').value.trim();
  const token    = document.getElementById('gh-token').value.trim();

  if (username) localStorage.setItem('gh_username', username);
  else localStorage.removeItem('gh_username');

  if (token) localStorage.setItem('gh_token', token);
  else localStorage.removeItem('gh_token');

  loadGitHubRepos(true);
}

async function loadGitHubRepos(showStatus = false) {
  const username = localStorage.getItem('gh_username');
  if (!username) return;

  const token   = localStorage.getItem('gh_token');
  const headers = { Accept: 'application/vnd.github+json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;

  const statusEl = document.getElementById('gh-status');
  if (showStatus && statusEl) {
    statusEl.textContent = 'Loading repos…';
    statusEl.classList.remove('hidden');
  }

  try {
    const resp = await fetch(
      `https://api.github.com/user/repos?per_page=100&sort=updated&affiliation=owner,collaborator`,
      { headers }
    );

    if (!resp.ok) {
      // Fall back to public repos if token auth fails
      const pub = await fetch(
        `https://api.github.com/users/${encodeURIComponent(username)}/repos?per_page=100&sort=updated`,
        { headers: { Accept: 'application/vnd.github+json' } }
      );
      if (!pub.ok) throw new Error('GitHub API error ' + pub.status);
      githubRepos = (await pub.json()).map(r => r.full_name).sort();
    } else {
      githubRepos = (await resp.json()).map(r => r.full_name).sort();
    }

    populateRepoDropdowns();

    if (showStatus && statusEl) {
      statusEl.textContent = `Loaded ${githubRepos.length} repos.`;
      setTimeout(() => statusEl.classList.add('hidden'), 3000);
    }
  } catch (e) {
    if (showStatus && statusEl) {
      statusEl.textContent = 'Error: ' + e.message;
      statusEl.style.color = 'var(--danger)';
    }
  }
}

function populateRepoDropdowns() {
  // Populate the add-job dropdown
  const sel = document.getElementById('new-job-repo');
  if (sel) {
    const current = sel.value;
    sel.innerHTML = buildRepoOptions(current);
  }
  // Re-render jobs so edit dropdowns pick up new list
  renderJobs();
}

// ─── Keyboard shortcuts ────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('login-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  document.getElementById('new-job-body').addEventListener('keydown', e => {
    // Cmd+Enter or Ctrl+Enter to submit
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) handleAddJob();
  });

  // Restore saved GitHub settings into the settings fields
  const savedUsername = localStorage.getItem('gh_username');
  const savedToken    = localStorage.getItem('gh_token');
  if (savedUsername) document.getElementById('gh-username').value = savedUsername;
  if (savedToken)    document.getElementById('gh-token').value    = savedToken;

  // Silently pre-load repos if settings are already saved
  if (savedUsername) loadGitHubRepos(false);

  checkSession();
});
